<head>

<title>Ruhaan Dubai • Cricket Prediction</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('https://i.pinimg.com/736x/8a/f1/ef/8af1efdbe7321314b207c9601d2ce5ab.jpg') no-repeat center/cover;
  overflow:hidden;
}

/* Dark overlay */
body::before{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
}

/* Center Card */
.card{
  position:relative;
  z-index:2;
  text-align:center;
  padding:25px;
  width:90%;
  max-width:320px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
  animation:float 4s ease-in-out infinite;
}

/* Floating animation */
@keyframes float{
  0%,100%{ transform: translateY(0px);}
  50%{ transform: translateY(-10px);}
}

/* DP */
.dp{
  width:100px;
  height:100px;
  border-radius:50%;
  border:3px solid #00e5ff;
  object-fit:cover;
  margin-bottom:15px;
}

/* Name */
.name{
  font-size:22px;
  color:#fff;
  font-weight:600;
  margin-bottom:5px;
}

/* Subtitle */
.sub{
  color:#ccc;
  font-size:14px;
  margin-bottom:20px;
}

/* Button */
.btn{
  display:block;
  padding:14px;
  border-radius:12px;
  background:linear-gradient(45deg,#00e5ff,#00c853);
  color:#000;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00e5ff;
}

/* Bottom text */
.footer{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  color:#aaa;
  font-size:12px;
}
</style>

</head>

<body>

<div class="card">

  <img class="dp" src="https://d1yei2z3i6k35z.cloudfront.net/13184094/69de131e1acb95.98369606_photo_2026-04-14_15-42-20.jpg">

  <div class="name">Ruhaan Dubai</div>

  <a class="btn" href="https://t.me/+AsL6ndwC2pFjNzll">

</div>

</body>
